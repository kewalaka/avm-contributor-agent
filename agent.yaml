name: avm-contributor-agent
description: >
  AVM module developer agent. Takes GitHub issues from upstream Azure Verified
  Module repos, writes code diffs on fork branches, dispatches CI to
  kewalaka/avm-contributions for deterministic test feedback, and opens PRs
  with UPGRADE.md evidence. Two-agent maker/checker pipeline (Developer +
  Reviewer). Supports Foundry-hosted mode with MCP server integration.
template:
  kind: hosted
  protocols:
    - name: responses
      version: v1
  environment_variables:
    - name: AZURE_AI_PROJECT_ENDPOINT
      description: Microsoft Foundry project endpoint URL
    - name: MODEL_DEPLOYMENT_NAME
      description: Model deployment name (default gpt-4.1)
    - name: AGENT_DISPATCH_TOKEN
      description: >
        Fine-grained PAT for dispatching CI to kewalaka/avm-contributions.
        Required scopes: Actions (read/write), Contents (read), Metadata (read).
        Owner: kewalaka, repo: kewalaka/avm-contributions. Recommended expiry: 90 days.
    - name: FOUNDRY_HOSTED
      description: Set to 'true' to enable Foundry-hosted mode with MCP support
    - name: GITHUB_MCP_CONNECTION_ID
      description: Foundry project connection ID for GitHub MCP server
    - name: AZURE_MCP_CONNECTION_ID
      description: Foundry project connection ID for Azure MCP server
    - name: EVA_MCP_SERVER_URL
      description: URL for the EVA/AzAPI MCP server
    - name: MULTI_AGENT
      description: Set to 'true' to enable multi-agent orchestration mode
    - name: TRUSTED_ORGS
      description: Comma-separated GitHub orgs whose modules are auto-approved
    - name: TRUSTED_REGISTRY
      description: Comma-separated Terraform registry namespaces that are auto-approved
    - name: TRACKING_DB_PATH
      description: Path to SQLite tracking database (default tracking.db)
