name: infra-testing-agent
description: >
  Infrastructure Testing Agent with expertise in Terraform, AVM, and Azure.
  Tests module upgrades by deploying old versions, planning new versions,
  and producing structured diff reports with idempotency checks.
  Supports MCP server integration for GitHub, Azure, and EVA/AzAPI.
template:
  kind: hosted
  protocols:
    - name: responses
      version: v1
  environment_variables:
    - name: AZURE_AI_PROJECT_ENDPOINT
      description: Microsoft Foundry project endpoint URL
    - name: MODEL_DEPLOYMENT_NAME
      description: Model deployment name (default gpt-4.1)
    - name: DEFAULT_LOCATION
      description: Azure region for test deployments
    - name: DEFAULT_SUBSCRIPTION_ID
      description: Target Azure subscription for test resource groups
    - name: CLEANUP_ON_COMPLETE
      description: Whether to destroy test resources after completion (true/false)
    - name: TEST_RG_PREFIX
      description: Naming prefix for test resource groups
    - name: FOUNDRY_HOSTED
      description: Set to 'true' to enable Foundry-hosted mode with MCP support
    - name: GITHUB_MCP_CONNECTION_ID
      description: Foundry project connection ID for GitHub MCP server
    - name: AZURE_MCP_CONNECTION_ID
      description: Foundry project connection ID for Azure MCP server
    - name: EVA_MCP_SERVER_URL
      description: URL for the EVA/AzAPI MCP server
    - name: MULTI_AGENT
      description: Set to 'true' to enable multi-agent orchestration mode
