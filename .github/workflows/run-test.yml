# Reusable workflow for AVM module testing.
#
# This workflow is called from AVM module repos (or manually) to deploy
# module examples to a test subscription and run analysis.
#
# Architecture:
#   - GHA handles terraform CLI execution (the "runner")
#   - The testing agent handles analysis (the "analyst")
#   - Results are uploaded as artifacts for cross-run tracking

name: Module Test

on:
  workflow_dispatch:
    inputs:
      module_source:
        description: "Module source (registry path, org/repo, or git URL)"
        required: true
        type: string
      base_ref:
        description: "Base reference (branch, tag, or version to compare from)"
        required: false
        default: "main"
        type: string
      head_ref:
        description: "Head reference (branch, tag, or version to compare to)"
        required: false
        default: ""
        type: string
      examples:
        description: "Comma-separated list of examples to test (empty = all)"
        required: false
        default: ""
        type: string
      skip_examples:
        description: "Comma-separated list of examples to skip"
        required: false
        default: ""
        type: string
      github_pr:
        description: "PR number to post results to (0 = no PR)"
        required: false
        default: "0"
        type: string
      cleanup:
        description: "Destroy resources after testing"
        required: false
        default: "true"
        type: string
      max_parallel:
        description: "Maximum parallel deployments"
        required: false
        default: "3"
        type: string

  workflow_call:
    inputs:
      module_source:
        required: true
        type: string
      base_ref:
        required: false
        default: "main"
        type: string
      head_ref:
        required: false
        default: ""
        type: string
      examples:
        required: false
        default: ""
        type: string
      skip_examples:
        required: false
        default: ""
        type: string
      github_pr:
        required: false
        default: "0"
        type: string
      cleanup:
        required: false
        default: "true"
        type: string
      max_parallel:
        required: false
        default: "3"
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write

env:
  TF_IN_AUTOMATION: "true"
  ARM_USE_OIDC: "true"

jobs:
  # ------------------------------------------------------------------
  # Discovery: clone the module and identify examples
  # ------------------------------------------------------------------
  discover:
    name: Discover examples
    runs-on: ubuntu-latest
    outputs:
      examples: ${{ steps.discover.outputs.examples }}
      module_path: ${{ steps.clone.outputs.module_path }}
    steps:
      - name: Checkout testing agent
        uses: actions/checkout@v4

      - name: Clone module under test
        id: clone
        run: |
          MODULE_SOURCE="${{ inputs.module_source }}"

          if [[ "$MODULE_SOURCE" == *"github.com"* ]] || [[ "$MODULE_SOURCE" == */* ]]; then
            # Git-based source
            REPO_URL="$MODULE_SOURCE"
            if [[ ! "$REPO_URL" == https://* ]]; then
              REPO_URL="https://github.com/${MODULE_SOURCE}.git"
            fi
            git clone "$REPO_URL" module-under-test
            if [[ -n "${{ inputs.head_ref }}" ]]; then
              cd module-under-test && git checkout "${{ inputs.head_ref }}"
            elif [[ "${{ inputs.base_ref }}" != "main" ]]; then
              cd module-under-test && git checkout "${{ inputs.base_ref }}"
            fi
          else
            echo "Registry-based sources not yet supported in GHA workflow"
            exit 1
          fi

          echo "module_path=${{ github.workspace }}/module-under-test" >> "$GITHUB_OUTPUT"

      - name: Discover examples
        id: discover
        run: |
          EXAMPLES_DIR="${{ steps.clone.outputs.module_path }}/examples"
          if [[ ! -d "$EXAMPLES_DIR" ]]; then
            echo "No examples directory found"
            echo 'examples=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # List example directories
          ALL_EXAMPLES=$(ls -d "$EXAMPLES_DIR"/*/ 2>/dev/null | xargs -I{} basename {} | sort)

          # Apply include filter
          INCLUDE="${{ inputs.examples }}"
          SKIP="${{ inputs.skip_examples }}"

          if [[ -n "$INCLUDE" ]]; then
            FILTERED=$(echo "$ALL_EXAMPLES" | grep -wF -f <(echo "$INCLUDE" | tr ',' '\n') || true)
          elif [[ -n "$SKIP" ]]; then
            FILTERED=$(echo "$ALL_EXAMPLES" | grep -vwF -f <(echo "$SKIP" | tr ',' '\n') || true)
          else
            FILTERED="$ALL_EXAMPLES"
          fi

          # Convert to JSON array for matrix
          JSON=$(echo "$FILTERED" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "examples=$JSON" >> "$GITHUB_OUTPUT"
          echo "Discovered examples: $JSON"

  # ------------------------------------------------------------------
  # Deploy: run terraform for each example (matrix)
  # Supports two modes:
  #   - Simple deploy (no head_ref): deploy at base_ref
  #   - Upgrade test (head_ref set): deploy at base_ref, then plan at head_ref
  # ------------------------------------------------------------------
  deploy:
    name: "Deploy: ${{ matrix.example }}"
    needs: discover
    if: needs.discover.outputs.examples != '[]'
    runs-on: ubuntu-latest
    environment: azure-test-lab
    strategy:
      fail-fast: false
      max-parallel: ${{ fromJson(inputs.max_parallel || '3') }}
      matrix:
        example: ${{ fromJson(needs.discover.outputs.examples) }}
    steps:
      - name: Checkout testing agent
        uses: actions/checkout@v4

      - name: Clone module under test
        run: |
          MODULE_SOURCE="${{ inputs.module_source }}"
          if [[ ! "$MODULE_SOURCE" == https://* ]]; then
            MODULE_SOURCE="https://github.com/${MODULE_SOURCE}.git"
          fi
          # Deep clone needed to switch between refs for upgrade testing
          git clone --depth 100 "$MODULE_SOURCE" module-under-test
          cd module-under-test && git checkout "${{ inputs.base_ref }}"

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      # Externalize TF_DATA_DIR so ref switching does not contaminate state
      - name: Set TF_DATA_DIR
        run: |
          TF_DATA="$RUNNER_TEMP/tf-data-${{ matrix.example }}"
          mkdir -p "$TF_DATA"
          echo "TF_DATA_DIR=$TF_DATA" >> "$GITHUB_ENV"

      # ----- Phase 1: Deploy at base_ref -----
      - name: "Base: terraform init"
        id: base_init
        working-directory: module-under-test/examples/${{ matrix.example }}
        run: terraform init -input=false -no-color 2>&1 | tee init-base.log
        continue-on-error: true

      - name: "Base: terraform plan"
        id: base_plan
        if: steps.base_init.outcome == 'success'
        working-directory: module-under-test/examples/${{ matrix.example }}
        run: |
          terraform plan -out=tfplan-base -input=false -no-color 2>&1 | tee plan-base.log
          terraform show -json tfplan-base > plan-base.json 2>/dev/null || true
        continue-on-error: true

      - name: "Base: terraform apply"
        id: base_apply
        if: steps.base_plan.outcome == 'success'
        working-directory: module-under-test/examples/${{ matrix.example }}
        run: terraform apply -auto-approve -input=false -no-color tfplan-base 2>&1 | tee apply-base.log
        continue-on-error: true

      - name: "Base: idempotency check"
        id: base_idempotency
        if: steps.base_apply.outcome == 'success'
        working-directory: module-under-test/examples/${{ matrix.example }}
        run: |
          set +e
          terraform plan -detailed-exitcode -input=false -no-color 2>&1 | tee idempotency.log
          EXITCODE=$?
          set -e
          if [[ $EXITCODE -eq 0 ]]; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          elif [[ $EXITCODE -eq 2 ]]; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            terraform plan -out=idem-plan -input=false -no-color > /dev/null 2>&1 || true
            terraform show -json idem-plan > idempotency-plan.json 2>/dev/null || true
          else
            echo "status=error" >> "$GITHUB_OUTPUT"
          fi
        continue-on-error: true

      # ----- Phase 2: Upgrade diff at head_ref (only when head_ref is set) -----
      - name: "Upgrade: switch to head_ref"
        id: switch_head
        if: inputs.head_ref != '' && steps.base_apply.outcome == 'success'
        working-directory: module-under-test
        run: |
          git fetch origin "${{ inputs.head_ref }}" --depth 100
          git checkout --detach FETCH_HEAD || git checkout --detach "${{ inputs.head_ref }}" || git checkout --detach "origin/${{ inputs.head_ref }}"
          HEAD_SHA=$(git rev-parse HEAD)
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "Switched to head_ref: ${{ inputs.head_ref }} ($HEAD_SHA)"

      - name: "Upgrade: terraform init -upgrade"
        id: upgrade_init
        if: steps.switch_head.outcome == 'success'
        working-directory: module-under-test/examples/${{ matrix.example }}
        run: terraform init -upgrade -input=false -no-color 2>&1 | tee init-upgrade.log
        continue-on-error: true

      - name: "Upgrade: terraform plan (diff only, do NOT apply)"
        id: upgrade_plan
        if: steps.upgrade_init.outcome == 'success'
        working-directory: module-under-test/examples/${{ matrix.example }}
        run: |
          terraform plan -out=upgrade-plan -input=false -no-color 2>&1 | tee plan-upgrade.log
          terraform show -json upgrade-plan > plan-upgrade.json 2>/dev/null || true
        continue-on-error: true

      # ----- Cleanup: always destroy -----
      # Switch back to head_ref state for destroy (resources match head if upgrade was partial)
      - name: Terraform destroy
        if: inputs.cleanup == 'true' && steps.base_apply.outcome == 'success'
        working-directory: module-under-test/examples/${{ matrix.example }}
        run: terraform destroy -auto-approve -input=false -no-color 2>&1 | tee destroy.log
        continue-on-error: true

      # ----- Build result artifact -----
      - name: Build deploy result
        if: always()
        run: |
          mkdir -p results
          IS_UPGRADE=$([[ -n "${{ inputs.head_ref }}" ]] && echo "true" || echo "false")
          cat > results/${{ matrix.example }}.json <<RESULT
          {
            "example": "${{ matrix.example }}",
            "test_mode": $([[ "$IS_UPGRADE" == "true" ]] && echo '"upgrade"' || echo '"deploy"'),
            "base_ref": "${{ inputs.base_ref }}",
            "head_ref": "${{ inputs.head_ref }}",
            "base_deploy": {
              "init_status": "${{ steps.base_init.outcome }}",
              "plan_status": "${{ steps.base_plan.outcome }}",
              "apply_status": "${{ steps.base_apply.outcome }}",
              "idempotency_status": "${{ steps.base_idempotency.outputs.status || 'skipped' }}"
            },
            "upgrade": {
              "switch_status": "${{ steps.switch_head.outcome || 'skipped' }}",
              "head_sha": "${{ steps.switch_head.outputs.head_sha || '' }}",
              "init_status": "${{ steps.upgrade_init.outcome || 'skipped' }}",
              "plan_status": "${{ steps.upgrade_plan.outcome || 'skipped' }}"
            },
            "status": "${{ steps.base_apply.outcome == 'success' && 'success' || 'failure' }}"
          }
          RESULT

      - name: Upload deploy result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-result-${{ matrix.example }}
          path: results/${{ matrix.example }}.json
          retention-days: 30

      - name: Upload base plan JSON
        if: steps.base_plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: plan-base-${{ matrix.example }}
          path: module-under-test/examples/${{ matrix.example }}/plan-base.json
          retention-days: 30

      - name: Upload upgrade plan JSON
        if: steps.upgrade_plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: plan-upgrade-${{ matrix.example }}
          path: module-under-test/examples/${{ matrix.example }}/plan-upgrade.json
          retention-days: 30

  # ------------------------------------------------------------------
  # Summarise: collect results and generate report
  # ------------------------------------------------------------------
  summarise:
    name: Summarise results
    needs: [discover, deploy]
    if: always() && needs.discover.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download all deploy results
        uses: actions/download-artifact@v4
        with:
          pattern: deploy-result-*
          path: results/
          merge-multiple: true

      - name: Build summary report
        run: |
          IS_UPGRADE=$([[ -n "${{ inputs.head_ref }}" ]] && echo "true" || echo "false")

          echo "# Module Test Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Module:** \`${{ inputs.module_source }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "**Base:** ${{ inputs.base_ref }}" >> "$GITHUB_STEP_SUMMARY"
          if [[ "$IS_UPGRADE" == "true" ]]; then
            echo "**Head:** ${{ inputs.head_ref }}" >> "$GITHUB_STEP_SUMMARY"
            echo "**Mode:** Upgrade test (deploy base, plan diff at head)" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "**Mode:** Simple deploy" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [[ "$IS_UPGRADE" == "true" ]]; then
            echo "| Example | Base Deploy | Base Idempotency | Upgrade Init | Upgrade Plan |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---------|------------|------------------|-------------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "| Example | Deploy | Idempotency |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---------|--------|-------------|" >> "$GITHUB_STEP_SUMMARY"
          fi

          PASS=0
          FAIL=0
          TOTAL=0

          for f in results/*.json; do
            if [[ -f "$f" ]]; then
              EXAMPLE=$(jq -r '.example' "$f")
              STATUS=$(jq -r '.status' "$f")
              TOTAL=$((TOTAL + 1))
              if [[ "$STATUS" == "success" ]]; then PASS=$((PASS + 1)); else FAIL=$((FAIL + 1)); fi

              if [[ "$IS_UPGRADE" == "true" ]]; then
                BASE_APPLY=$(jq -r '.base_deploy.apply_status' "$f")
                BASE_IDEMP=$(jq -r '.base_deploy.idempotency_status' "$f")
                UPG_INIT=$(jq -r '.upgrade.init_status' "$f")
                UPG_PLAN=$(jq -r '.upgrade.plan_status' "$f")

                icon() { [[ "$1" == "success" || "$1" == "pass" ]] && echo "✅" || ([[ "$1" == "skipped" ]] && echo "⏭️" || echo "❌"); }
                echo "| $EXAMPLE | $(icon "$BASE_APPLY") $BASE_APPLY | $(icon "$BASE_IDEMP") $BASE_IDEMP | $(icon "$UPG_INIT") $UPG_INIT | $(icon "$UPG_PLAN") $UPG_PLAN |" >> "$GITHUB_STEP_SUMMARY"
              else
                IDEMP=$(jq -r '.base_deploy.idempotency_status // .idempotency_status' "$f")
                STATUS_ICON=$([[ "$STATUS" == "success" ]] && echo "✅" || echo "❌")
                IDEMP_ICON=$([[ "$IDEMP" == "pass" ]] && echo "✅" || ([[ "$IDEMP" == "skipped" ]] && echo "⏭️" || echo "❌"))
                echo "| $EXAMPLE | $STATUS_ICON $STATUS | $IDEMP_ICON $IDEMP |" >> "$GITHUB_STEP_SUMMARY"
              fi
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Total:** $TOTAL | **Pass:** $PASS | **Fail:** $FAIL" >> "$GITHUB_STEP_SUMMARY"

          # Merge results into a single JSON for artifact upload
          jq -s '.' results/*.json > test-report.json

      - name: Upload combined report
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: test-report.json
          retention-days: 90

      - name: Post PR comment
        if: inputs.github_pr != '0' && inputs.github_pr != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMENT_BODY=$(cat "$GITHUB_STEP_SUMMARY")
          gh pr comment "${{ inputs.github_pr }}" \
            --repo "${{ inputs.module_source }}" \
            --body "$COMMENT_BODY" || echo "Could not post PR comment"
